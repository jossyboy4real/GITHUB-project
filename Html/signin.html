<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="./Multimedia/Images/github-removebg-preview.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Sign in to GitHub</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        background-color: rgb(13, 17, 23);
        /* overflow-y: hidden; */
    }

    .wrapper {
        min-height: 100vh;
        background-color: rgb(13, 17, 23);
        text-align: center;
        padding: 24px 16px 96px;

    }

    .container {
        margin: auto;
        width: min(100%, 350px);
        padding-top: 16px;
    }

    .container i {
        color: white;
        font-size: 43px;
    }

    .container span {
        font-size: 20px;
        font-weight: 600;
        line-height: 30px;
        color: rgb(240, 246, 252);
    }

    .form-card {
        width: min(100%, 350px);
        margin: 28px auto 0;
        padding: 0;
        text-align: left;
    }

    .email {
        margin-bottom: 16px;
    }

    .email label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        line-height: 21px;
        color: rgb(240, 246, 252);
    }

    .email input {
        padding: 12px;
        width: 100%;
        border: 1px solid rgb(48, 54, 61);
        border-radius: 8px;
        margin-top: 8px;
        appearance: none;
        color: rgb(240, 246, 252);
        background-color: rgb(13, 17, 23);
        outline: none;
    }

    .email input:focus {
        border-color: rgb(47, 129, 247);
        box-shadow: 0 0 0 1px rgb(47, 129, 247);
    }

    .pass {
        margin-bottom: 16px;
    }

    .pass-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
    }

    .pass label {
        font-size: 14px;
        font-weight: 600;
        line-height: 21px;
        color: rgb(240, 246, 252);
    }

    .pass input {
        appearance: none;
        padding: 12px;
        width: 100%;
        border: 1px solid rgb(48, 54, 61);
        border-radius: 8px;
        margin-top: 8px;
        color: rgb(240, 246, 252);
        background-color: rgb(13, 17, 23);
        outline: none;
    }

    .pass a {
        text-decoration: none;
        font-size: 14px;
        font-weight: 400;
        line-height: 21px;
        color: rgb(68, 147, 248);
    }

    .pass a:hover {
        text-decoration: underline;
    }

    .pass input:focus {
        border-color: rgb(47, 129, 247);
        box-shadow: 0 0 0 1px rgb(47, 129, 247);
    }

    .sign {
        margin-bottom: 24px;
    }

    .sign button {
        background-color: rgb(46, 160, 67);
        font-size: 14px;
        font-weight: 600;
        line-height: 20px;
        color: rgb(255, 255, 255);
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
    }

    .sign button:hover {
        background-color: rgb(52, 168, 71);
    }

    .or {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
    }

    .or::before,
    .or::after {
        content: "";
        flex: 1;
        height: 1px;
        background-color: rgb(48, 54, 61);
    }

    .or span {
        font-size: 14px;
        font-weight: 400;
        line-height: 21px;
        color: rgb(139, 148, 158);

    }

    .social {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .social a {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        text-decoration: none;
        border: 1px solid rgb(48, 54, 61);
        background-color: rgb(33, 38, 45);
        color: rgb(240, 246, 252);
        border-radius: 8px;
        padding: 11px 14px;
        font-weight: 600;
    }


    .social a:hover {
        background-color: rgb(43, 49, 57);
    }

    .social span {
        font-size: 14px;
        font-weight: 500;
        line-height: 21px;
    }

    .create-links {
        width: min(100%, 350px);
        margin: auto;
        margin-top: 28px;
    }

    .create-links p,
    .footer a,
    .passkey-link {
        font-size: 14px;
        font-weight: 400;
        line-height: 21px;
        color: rgb(240, 246, 252);
    }

    .create-links a,
    .footer a,
    .passkey-link {
        color: rgb(68, 147, 248);
        text-decoration: none;
    }

    .create-links a:hover {
        text-decoration: underline;
    }

    .passkey {
        width: min(100%, 350px);
        margin: 24px auto 0;
    }

    .passkey-link {
        font-size: 16px;
        font-weight: 500;
        line-height: 24px;
    }

    .passkey-link:hover {
        text-decoration: underline;
    }

    .footer {
        width: 100%;
        margin: 0;
        padding: 16px 24px;
        position: fixed;
        left: 0;
        bottom: 0;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 18px 28px;
        background-color: rgb(22, 27, 34);
    }

    .footer a {
        font-size: 12px;
        line-height: 18px;
        color: rgb(139, 148, 158);
    }

    .footer a:hover {
        text-decoration: underline;
        color: rgb(68, 147, 248);
    }

    @media (max-width: 480px) {
        .wrapper {
            padding: 22px 12px 120px;
        }

        .container i {
            font-size: 42px;
        }

        .container span {
            font-size: 18px;
        }

        .pass-top {
            flex-direction: column;
            align-items: flex-start;
        }

        .footer {
            position: static;
            margin-top: 48px;
            padding-inline: 16px;
        }
    }
</style>

<body>
    <div class="wrapper">
        <div class="container">
            <a href="../index.html" class="brand"><i class="git bi bi-github"></i></a>

            <div><span>Sign in to GitHub</span></div>
        </div>

        <form class="form-card">
            <div class="email">
                <label for="username">Username or email address</label>
                <input id="username" type="text" autocomplete="username">
            </div>

            <div class="pass">
                <div class="pass-top">
                    <label for="password">Password</label>
                    <a href="#">Forgot password?</a>
                </div>
                <input id="password" type="password" autocomplete="current-password">
            </div>

            <div class="sign"><button type="submit">Sign in</button></div>

            <div class="or"><span>or</span></div>

            <div class="social">
                <a href="#">
                    <img src="../Multimedia/Images/google.svg" alt="">
                    <span>Continue with Google</span>
                </a>

                <a href="#">
                    <i class="bi bi-apple"></i>
                    <span>Continue with Apple</span>
                </a>
            </div>
        </form>

        <div class="create-links">
            <p>New to GitHub? <a href="#">Create an account</a></p>
        </div>

        <div class="passkey">
            <a class="passkey-link" href="#">Sign in with a passkey</a>
        </div>

        <div class="footer">
            <a href="#">Terms</a>
            <a href="#">Privacy</a>
            <a href="#">Docs</a>
            <a href="#">Contact GitHub Support</a>
            <a href="#">Manage cookies</a>
            <a href="#">Do not share my personal information</a>
        </div>
    </div>
</body>

</html>
